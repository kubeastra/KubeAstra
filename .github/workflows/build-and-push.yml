# ── K8s DevOps Assistant — Build & Push to GitHub Container Registry ─────────
#
# Builds and pushes two Docker images to ghcr.io:
#   ghcr.io/<owner>/k8s-devops-backend:<tag>
#   ghcr.io/<owner>/k8s-devops-frontend:<tag>
#
# No secrets needed — GITHUB_TOKEN is automatically available and has
# write:packages permission on the repo owner's ghcr.io namespace.
#
# Triggers:
#   - Push to main or develop branches
#   - Any tag matching v*  (e.g. v1.2.3)
#   - Manual dispatch (with optional custom tag)

name: Build & Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Override image tag (leave blank for auto)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/k8s-devops-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/k8s-devops-frontend

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Compute image tag ─────────────────────────────────────────────────
      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.custom_tag }}" ]; then
            TAG="${{ github.event.inputs.custom_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            TAG="${BRANCH}-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      # ── 3. Set up Docker Buildx ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to ghcr.io ─────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Build & push backend ──────────────────────────────────────────────
      # Build context is the repo root so Docker can COPY both
      # mcp/ and ui/backend/ into one image.
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ui/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── 6. Build & push frontend ─────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ui/frontend
          file:    ui/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # ── 7. Summary ───────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## Images pushed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.BACKEND_IMAGE }}\` | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.FRONTEND_IMAGE }}\` | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy with Helm:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade --install k8s-devops helm/k8s-devops-assistant \\" >> $GITHUB_STEP_SUMMARY
          echo "  --namespace k8s-devops --create-namespace \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set backend.image.repository=${{ env.BACKEND_IMAGE }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set backend.image.tag=${{ steps.tag.outputs.tag }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set frontend.image.repository=${{ env.FRONTEND_IMAGE }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set frontend.image.tag=${{ steps.tag.outputs.tag }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  -f my-values.yaml" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
