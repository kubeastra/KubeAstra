apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hog
  namespace: demo
  labels:
    app: memory-hog
    scenario: oom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-hog
  template:
    metadata:
      labels:
        app: memory-hog
        scenario: oom
    spec:
      containers:
        - name: app
          image: polinux/stress:latest
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "128M", "--vm-hang", "0"]
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 48Mi
              cpu: 50m
