{{/*
HTTP MCP server service — port 8001.

Exposes the MCP endpoint for IDE clients (Cursor, Claude Desktop, VS Code, etc.).
Default is an Internal LoadBalancer so corporate-network IDEs can connect without
exposing the endpoint publicly. Override mcp.service.type and annotations in
values.yaml for your environment.

MCP client config example:
  "mcpServers": {
    "kubeastra": {
      "type": "http",
      "url": "http://<ilb-ip>:8001/mcp/",
      "headers": { "Authorization": "Bearer <mcpAuthToken>" }
    }
  }
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeastra.fullname" . }}-mcp
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubeastra.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- with .Values.mcp.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mcp.service.type }}
  selector:
    {{- include "kubeastra.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: mcp
      port: {{ .Values.mcp.service.port }}
      targetPort: mcp
      protocol: TCP
      {{- if and (eq .Values.mcp.service.type "NodePort") .Values.mcp.service.nodePort }}
      nodePort: {{ .Values.mcp.service.nodePort }}
      {{- end }}
