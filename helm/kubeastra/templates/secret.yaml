{{- if or .Values.secrets.geminiApiKey .Values.secrets.kubeconfig .Values.secrets.mcpAuthToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeastra.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubeastra.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.kubeconfig }}
  # kubeconfig — mounted as a file at /app/kubeconfig/config
  config: {{ .Values.secrets.kubeconfig | quote }}
  {{- end }}
  {{- if .Values.secrets.mcpAuthToken }}
  # MCP_AUTH_TOKEN — bearer token for the HTTP MCP server (port 8001)
  MCP_AUTH_TOKEN: {{ .Values.secrets.mcpAuthToken | b64enc | quote }}
  {{- end }}
{{- end }}
