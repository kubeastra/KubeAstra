apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeastra.backendServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubeastra.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubeastra.backend.selectorLabels" . | nindent 4 }}
