# ── values.yaml — Kubeastra Helm Chart ────────────────────────────
#
# Minimal install (pass secrets via --set or a secrets file):
#
#   helm install kubeastra . \
#     --namespace kubeastra --create-namespace \
#     --set backend.image.repository=ghcr.io/your-org/kubeastra-backend \
#     --set backend.image.tag=1.0.0 \
#     --set frontend.image.repository=ghcr.io/your-org/kubeastra-frontend \
#     --set frontend.image.tag=1.0.0 \
#     --set secrets.geminiApiKey="YOUR_GEMINI_API_KEY" \
#     --set secrets.kubeconfig="$(cat ~/.kube/config | base64)"

# ── Global ────────────────────────────────────────────────────────────────────
nameOverride: ""
# Shorten pod names: "kubeastra-backend-xxx" / "kubeastra-frontend-xxx"
# Without this, Helm combines release name + chart name → "kubeastra-..."
fullnameOverride: "kubeastra"

namespace: kubeastra

# ── Backend (FastAPI + mcp) ───────────────────────────────────────
backend:
  image:
    # Replace with your registry — e.g. ghcr.io/your-org/kubeastra-backend
    repository: ghcr.io/your-org/kubeastra-backend
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8800

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # Liveness / readiness probes
  livenessProbe:
    httpGet:
      path: /health
      port: 8800
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 8800
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Non-secret application configuration
  config:
    # Kubernetes namespaces allowed for kubectl queries (* = all)
    allowedNamespaces: "*"
    # kubectl command timeout in seconds
    kubectlTimeoutSeconds: "15"
    # Maximum log lines per request
    maxLogTailLines: "200"
    # Maximum output bytes per tool response
    maxOutputBytes: "20000"
    # Gemini model to use
    geminiModel: "gemini-2.5-flash"
    # Enable write/recovery operations (delete_pod, rollout_restart, scale, patch)
    enableRecoveryOperations: "false"
    # Weaviate URL (set if RAG is enabled)
    weaviateUrl: "http://localhost:8080"
    weaviateCollection: "K8sAnsibleError"
    embeddingModel: "sentence-transformers/all-MiniLM-L6-v2"
    # k8sgpt CLI integration (requires k8sgpt installed in the image)
    enableK8sgpt: "false"

  # ── SQLite persistence ─────────────────────────────────────────────────────
  # The backend writes chat_history.db to /app/data/ (controlled by DB_PATH).
  # Without a PVC the file is lost on pod restart (all chat histories cleared).
  # Set enabled: true and choose a storageClass to keep history across restarts.
  persistence:
    enabled: false
    storageClass: ""      # "" = cluster default; "standard", "gp2", etc.
    size: 1Gi
    accessMode: ReadWriteOnce
    mountPath: /app/data

  # Node selector, tolerations, affinity (optional)
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Frontend (Next.js) ────────────────────────────────────────────────────────
frontend:
  image:
    # Replace with your registry — e.g. ghcr.io/your-org/kubeastra-frontend
    repository: ghcr.io/your-org/kubeastra-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: LoadBalancer
    port: 3300
    # Add cloud-provider annotations here as needed.
    # GKE internal LB example:
    #   networking.gke.io/load-balancer-type: "Internal"
    # AWS NLB example:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    annotations: {}

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  # The frontend calls the backend API. In-cluster, use the backend Service DNS.
  # If using Ingress with a public URL, override this with the public backend URL.
  # Default uses the in-cluster service name resolved at deploy time via _helpers.tpl.
  apiUrl: ""  # Leave blank to auto-resolve to http://<release-name>-backend:8800

  livenessProbe:
    httpGet:
      path: /
      port: 3300
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 3300
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Secrets ───────────────────────────────────────────────────────────────────
# IMPORTANT: Do not commit real values here.
# Pass via: --set secrets.geminiApiKey="..." --set secrets.kubeconfig="..."
# Or use a sealed-secrets / external-secrets solution.
secrets:
  # Your Gemini API key (get one at https://aistudio.google.com/)
  geminiApiKey: ""

  # Your kubeconfig file content, base64-encoded.
  # Generate with: cat ~/.kube/config | base64 | tr -d '\n'
  # This is mounted at /app/kubeconfig/config inside the backend pod.
  kubeconfig: ""

  # Bearer token for the HTTP MCP server (port 8001).
  # When set, MCP clients must send: Authorization: Bearer <token>
  # Leave blank to run the MCP server without authentication (not recommended for production).
  mcpAuthToken: ""

# ── HTTP MCP server (port 8001) ───────────────────────────────────────────────
# The same Docker image also runs an HTTP MCP server that Cursor, Claude Desktop,
# and any other MCP-compatible client can connect to directly.
#
# Default: Internal LoadBalancer so IDEs on the corporate network can reach it
# without exposing the endpoint to the public internet.
#
# MCP client config example (Cursor, Claude Desktop, VS Code, etc.):
#   "mcpServers": {
#     "kubeastra": {
#       "type": "http",
#       "url": "http://<ilb-ip>:8001/mcp/",
#       "headers": { "Authorization": "Bearer <mcpAuthToken>" }
#     }
#   }
mcp:
  service:
    type: LoadBalancer
    port: 8001
    nodePort: ""         # Only used when type=NodePort (e.g. 30801)
    # Annotations to make this an Internal Load Balancer.
    # The correct annotation depends on your cloud provider.
    # GKE:  networking.gke.io/load-balancer-type: "Internal"
    # AWS:  service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    # Azure: service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    annotations:
      networking.gke.io/load-balancer-type: "Internal"

# ── ServiceAccount + RBAC ─────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""  # Auto-generated if blank
  annotations: {}

# RBAC: ClusterRole giving the backend read access to cluster resources.
# Required so the ServiceAccount has an identity; also used if you ever
# switch from kubeconfig-based to in-cluster kubectl access.
rbac:
  create: true

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "nginx"  # Change to your ingress controller class
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  # Frontend host — serves the chat UI
  frontendHost: "kubeastra.example.com"
  # Backend host — serves the API (optional: use path-based routing instead)
  backendHost: "kubeastra-api.example.com"
  tls: []
  # - secretName: kubeastra-tls
  #   hosts:
  #     - kubeastra.example.com
  #     - kubeastra-api.example.com

# ── Image pull secret (for private registries) ───────────────────────────────
imagePullSecrets: []
# - name: registry-pull-secret
