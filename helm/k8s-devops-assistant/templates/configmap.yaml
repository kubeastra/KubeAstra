apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-devops-assistant.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-devops-assistant.labels" . | nindent 4 }}
data:
  # ── Kubernetes settings ──────────────────────────────────────────────────────
  ALLOWED_NAMESPACES: {{ .Values.backend.config.allowedNamespaces | quote }}
  KUBECTL_TIMEOUT_SECONDS: {{ .Values.backend.config.kubectlTimeoutSeconds | quote }}
  MAX_LOG_TAIL_LINES: {{ .Values.backend.config.maxLogTailLines | quote }}
  MAX_OUTPUT_BYTES: {{ .Values.backend.config.maxOutputBytes | quote }}
  ENABLE_RECOVERY_OPERATIONS: {{ .Values.backend.config.enableRecoveryOperations | quote }}
  ENABLE_K8SGPT: {{ .Values.backend.config.enableK8sgpt | quote }}

  # ── Gemini / AI settings ─────────────────────────────────────────────────────
  GEMINI_MODEL: {{ .Values.backend.config.geminiModel | quote }}

  # ── Vector DB / RAG settings (optional) ──────────────────────────────────────
  WEAVIATE_URL: {{ .Values.backend.config.weaviateUrl | quote }}
  WEAVIATE_COLLECTION: {{ .Values.backend.config.weaviateCollection | quote }}
  EMBEDDING_MODEL: {{ .Values.backend.config.embeddingModel | quote }}

  # ── Paths (set by Dockerfile, listed here for clarity) ───────────────────────
  MCP_PATH: "/app/mcp"
  PYTHONPATH: "/app/mcp"
  KUBECONFIG: "/app/kubeconfig/config"

  # ── SQLite database path ──────────────────────────────────────────────────────
  # Matches backend.persistence.mountPath. If persistence is disabled this path
  # still works — SQLite creates the file in-memory on the container filesystem
  # (lost on restart). Set backend.persistence.enabled=true to persist across restarts.
  DB_PATH: {{ printf "%s/chat_history.db" .Values.backend.persistence.mountPath | quote }}
